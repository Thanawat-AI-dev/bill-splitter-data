      <div class="settings-block">
        <h3>Firebase Firestore (แนะนำ / ฟรี)</h3>
        <p class="modal-hint">วาง Firebase web config จาก Firebase Console แล้วกดบันทึก ใช้กับลิงก์แชร์ให้เพื่อน</p>
        <label>Firebase config JSON
          <textarea id="set-firebase-config" rows="7" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","appId":"..."}'></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="firebase-disconnect">ล้าง Firebase</button>
          <button type="button" class="btn primary" id="firebase-save">บันทึก Firebase</button>
        </div>
        <div class="settings-test-result" id="firebase-test-result"></div>
      </div>
      <div class="settings-divider"></div>
      <p class="modal-hint">
        GitHub mode เก็บโปรเจกต์เป็นไฟล์ JSON ในรีโพของคุณ โทเค็นจะอยู่ใน localStorage ของเบราว์เซอร์นี้เท่านั้น
        และไม่ถูกใส่ในลิงก์แชร์แล้ว
      </p>
      <form id="settings-form">
        <label>Personal Access Token
          <input type="password" id="set-token" placeholder="github_pat_..." autocomplete="off" required>
        </label>
        <div class="form-row">
          <label>Owner / Organization
            <input type="text" id="set-owner" placeholder="เช่น your-username" required>
          </label>
          <label>ชื่อรีโพ (Repository)
            <input type="text" id="set-repo" placeholder="เช่น bill-splitter-data" required>
          </label>
        </div>
        <label>Branch
          <input type="text" id="set-branch" placeholder="main" value="main">
        </label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="settings-disconnect">ล้างการเชื่อมต่อ</button>
          <button type="submit" class="btn primary">บันทึกและทดสอบการเชื่อมต่อ</button>
        </div>
        <div class="settings-test-result" id="settings-test-result"></div>
      </form>
    </div>
  </div>

  <!-- Confirm Modal (generic) -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-card small">
      <div class="modal-card-head">
        <h2 id="confirm-title">ยืนยันการทำรายการ</h2>
      </div>
      <p id="confirm-body"></p>
      <div class="modal-actions">
        <button class="btn ghost" id="confirm-cancel">ยกเลิก</button>
        <button class="btn danger" id="confirm-ok">ยืนยัน</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toast-text"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
